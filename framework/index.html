<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{message}}</title>
    <style>
      :root {
        --bg: #f4f7ff;
        --card: #ffffff;
        --accent: #6c8cff;
        --accent-soft: #e8eeff;
        --text: #2f3650;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #eef4ff);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 12px 30px rgba(108, 140, 255, 0.16);
        width: min(100%, 360px);
        text-align: center;
        animation: fadeUp 0.8s ease both;
      }

      .avatar {
        width: 78px;
        height: 78px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #8ea4ff);
        display: grid;
        place-items: center;
        color: white;
        font-size: 32px;
        font-weight: bold;
        animation: bob 2.4s ease-in-out infinite;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .role {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
      }

      .info {
        background: var(--accent-soft);
        border-radius: 14px;
        padding: 14px;
        margin-top: 10px;
        transition: transform 0.2s ease;
      }

      .info:hover {
        transform: translateY(-2px);
      }

      .label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-bottom: 4px;
      }

      .value {
        font-size: 20px;
        font-weight: 700;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">S</div>
      <h1>{{message}}</h1>
      <p class="role">A simple and friendly display</p>

      <div class="info">
        <span class="label">Name</span>
        <div class="value">Sarah Johnson</div>
      </div>

      <div class="info">
        <span class="label">Age</span>
        <div class="value">20</div>
      </div>
    </div>
  </body>
</html>
